<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Public+Sans:ital,wght@0,400;0,500;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  .rt {
    --ink: #161C1C;
    --console: #1E2625;
    --console-2: #2B3533;
    --paper: #F1F4F3;
    --paper-2: #FFFFFF;
    --rule: #CBD3D0;
    --rule-soft: #E3E9E7;
    --sig: #3CA67E;
    --alert: #D6453D;
    --good: #3CA67E;
    --muted: #6B7773;

    --display: 'Bricolage Grotesque', 'Arial Black', system-ui, sans-serif;
    --body: 'Public Sans', system-ui, -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    font-family: var(--body);
    color: var(--ink);
    background: var(--paper);
    line-height: 1.55;
    display: grid;
    grid-template-columns: 232px 1fr;
    min-height: 720px;
    border: 1px solid var(--ink);
    overflow: hidden;
  }
  .rt *, .rt *::before, .rt *::after { box-sizing: border-box; }
  .rt :focus-visible { outline: 3px solid var(--sig); outline-offset: 2px; }

  /* ---------- SIGNATURE: the shift rail ---------- */
  .rt-rail {
    background: var(--console);
    color: #E3E9E7;
    padding: 22px 0 28px;
    position: relative;
  }
  .rt-rail-head { padding: 0 18px 18px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .rt-logo {
    display: block; width: 148px; height: auto; margin-bottom: 14px;
  }
  .rt-rail-head .brand {
    font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--sig);
  }
  .rt-rail-head .shift {
    font-family: var(--display); font-size: 19px; font-weight: 800;
    letter-spacing: -.02em; color: #fff; margin-top: 4px; line-height: 1.15;
  }
  .rt-rail-head .who {
    font-family: var(--mono); font-size: 10.5px; color: #8C9A96; margin-top: 8px;
  }
  .rt-clock {
    font-family: var(--mono); font-size: 11px; color: #8C9A96;
    padding: 12px 18px 8px; display: flex; justify-content: space-between;
  }
  .rt-clock b { color: var(--sig); font-weight: 500; }

  .rt-stops { list-style: none; margin: 0; padding: 0 0 0 18px; position: relative; }
  .rt-stops::before {
    content: ''; position: absolute; left: 25px; top: 10px; bottom: 10px;
    width: 1px; background: rgba(255,255,255,.14);
  }
  .rt-stop {
    position: relative; padding: 7px 14px 7px 26px; cursor: pointer;
    display: block; width: 100%; text-align: left; background: none;
    border: 0; color: #A6B2AE; font-family: var(--body); font-size: 12.5px;
  }
  .rt-stop::before {
    content: ''; position: absolute; left: 3.5px; top: 14px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--console); border: 1.5px solid #5C6A66;
  }
  .rt-stop .t {
    font-family: var(--mono); font-size: 9.5px; color: #6E7C77;
    display: block; letter-spacing: .05em;
  }
  .rt-stop:hover { color: #fff; }
  .rt-stop.done::before { background: rgba(60,166,126,.5); border-color: rgba(60,166,126,.6); }
  .rt-stop.here { color: #fff; font-weight: 700; }
  .rt-stop.here::before {
    background: var(--sig); border-color: var(--sig);
    box-shadow: 0 0 0 4px rgba(60,166,126,.22);
  }
  .rt-stop.here .t { color: var(--sig); }
  .rt-railgroup {
    font-family: var(--mono); font-size: 9px; letter-spacing: .18em;
    text-transform: uppercase; color: #57655F; padding: 16px 0 4px 26px;
  }

  /* ---------- stage ---------- */
  .rt-stage { background: var(--paper); overflow-y: auto; max-height: 88vh; }
  .rt-topbar {
    position: sticky; top: 0; z-index: 5; background: var(--ink); color: #fff;
    display: flex; align-items: center; gap: 14px; padding: 9px 24px;
    border-bottom: 1px solid var(--ink);
  }
  .rt-logo-sm { display: none; width: 84px; height: auto; }
  .rt-topbar .kind {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .16em;
    text-transform: uppercase; padding: 3px 7px; border: 1px solid var(--sig);
    color: var(--sig);
  }
  .rt-topbar .kind.drill { border-color: var(--alert); color: #FF9089; }
  .rt-topbar .nm { font-family: var(--mono); font-size: 11.5px; color: #9CA9A5; flex: 1; }
  .rt-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
    text-transform: uppercase; padding: 6px 13px; border: 1px solid var(--ink);
    background: var(--sig); color: var(--ink); cursor: pointer; font-weight: 600;
  }
  .rt-btn:hover { background: #55C093; }
  .rt-btn.ghost { background: transparent; color: #CBD6D2; border-color: #4B5854; }
  .rt-btn.ghost:hover { background: #2B3533; color: #fff; }
  .rt-btn:disabled { opacity: .4; cursor: not-allowed; }

  .rt-pane { padding: 30px 40px 70px; max-width: 860px; }
  .rt-eyebrow {
    font-family: var(--mono); font-size: 10px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--muted);
  }
  .rt-h1 {
    font-family: var(--display); font-weight: 800; font-size: 34px;
    letter-spacing: -.03em; line-height: 1.05; margin: 6px 0 12px;
  }
  .rt-lede { font-size: 16.5px; color: #333D3B; margin-bottom: 26px; max-width: 62ch; }
  .rt-h2 {
    font-family: var(--display); font-weight: 700; font-size: 19px;
    letter-spacing: -.02em; margin: 32px 0 10px; padding-bottom: 6px;
    border-bottom: 2px solid var(--ink);
  }
  .rt-pane p { margin: 0 0 12px; max-width: 66ch; }
  .rt-pane ul { margin: 0 0 14px; padding-left: 18px; max-width: 66ch; }
  .rt-pane li { margin-bottom: 6px; }
  .rt strong { font-weight: 700; }
  .rt em { font-style: italic; color: #333D3B; }
  .rt code {
    font-family: var(--mono); font-size: .88em; background: #E4EAE8;
    padding: 1px 5px; border-radius: 2px;
  }

  .rt-card {
    background: var(--paper-2); border: 1px solid var(--rule);
    padding: 18px 20px; margin: 16px 0;
  }
  .rt-card h4 {
    font-family: var(--display); font-size: 15px; font-weight: 700;
    margin: 0 0 6px; letter-spacing: -.01em;
  }
  .rt-card p:last-child, .rt-card ul:last-child { margin-bottom: 0; }

  .rt-pull {
    border-left: 3px solid var(--sig); background: #EDF8F3;
    padding: 12px 16px; margin: 18px 0; font-size: 15px;
  }
  .rt-warn { border-left-color: var(--alert); background: #FDEDEC; }
  .rt-pull .lbl {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .16em;
    text-transform: uppercase; color: #1E6E52; display: block; margin-bottom: 4px;
  }
  .rt-warn .lbl { color: #9C2F28; }

  .rt-table { width: 100%; border-collapse: collapse; margin: 14px 0 20px; font-size: 13.5px; }
  .rt-table th {
    text-align: left; font-family: var(--mono); font-size: 9.5px;
    letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
    border-bottom: 1.5px solid var(--ink); padding: 7px 10px 7px 0; vertical-align: bottom;
  }
  .rt-table td { padding: 9px 10px 9px 0; border-bottom: 1px solid var(--rule-soft); vertical-align: top; }
  .rt-table tr:hover td { background: #FBFCFC; }
  .rt-table td:first-child { font-weight: 600; }

  .rt-layers { display: grid; gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin: 18px 0 24px; }
  .rt-layer {
    background: var(--paper-2); padding: 12px 16px;
    display: grid; grid-template-columns: 26px 1fr 1.1fr; gap: 14px; align-items: baseline;
  }
  .rt-layer .n { font-family: var(--mono); font-size: 11px; color: var(--sig); font-weight: 600; }
  .rt-layer .l { font-family: var(--display); font-weight: 700; font-size: 14.5px; }
  .rt-layer .l span { display: block; font-family: var(--body); font-weight: 400; font-size: 12.5px; color: var(--muted); }
  .rt-layer .tools { font-family: var(--mono); font-size: 11.5px; color: #333D3B; }

  /* ---------- interactive ---------- */
  .rt-do {
    border: 1.5px solid var(--ink); background: var(--paper-2);
    margin: 26px 0; box-shadow: 4px 4px 0 var(--console);
  }
  .rt-do-head {
    background: var(--ink); color: #fff; padding: 8px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .rt-do-head .tag {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--sig);
  }
  .rt-do-head .ttl { font-family: var(--display); font-weight: 700; font-size: 14px; flex: 1; }
  .rt-do-body { padding: 18px 20px; }

  .rt-q { font-size: 15px; font-weight: 600; margin: 0 0 10px; }
  .rt-opts { display: grid; gap: 7px; margin-bottom: 6px; }
  .rt-opt {
    text-align: left; border: 1px solid var(--rule); background: var(--paper-2);
    padding: 9px 12px; font-family: var(--body); font-size: 13.5px; cursor: pointer;
    display: flex; gap: 10px; align-items: flex-start; color: var(--ink);
  }
  .rt-opt:hover { border-color: var(--ink); }
  .rt-opt .k {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    border: 1px solid var(--rule); width: 18px; height: 18px; flex: 0 0 18px;
    display: grid; place-items: center; margin-top: 1px;
  }
  .rt-opt.right { border-color: var(--good); background: #E9F7F1; }
  .rt-opt.right .k { border-color: var(--good); color: var(--good); }
  .rt-opt.wrong { border-color: var(--alert); background: #FDEDEC; }
  .rt-opt.wrong .k { border-color: var(--alert); color: var(--alert); }
  .rt-opt:disabled { cursor: default; }
  .rt-fb {
    font-size: 13px; margin-top: 10px; padding: 10px 12px;
    background: #EDF1EF; border-left: 3px solid var(--muted); display: none;
  }
  .rt-fb.show { display: block; }

  .rt textarea, .rt input[type=text] {
    width: 100%; font-family: var(--body); font-size: 14px; color: var(--ink);
    border: 1px solid var(--rule); background: #FCFDFD; padding: 10px 12px;
    resize: vertical; line-height: 1.5;
  }
  .rt textarea:focus, .rt input:focus { border-color: var(--ink); background: #fff; }
  .rt textarea:disabled { background: #EDF1EF; color: #5A6663; }
  .rt label.fld {
    font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted); display: block; margin: 12px 0 4px;
  }
  .rt select {
    font-family: var(--body); font-size: 14px; padding: 9px 10px;
    border: 1px solid var(--rule); background: #fff; color: var(--ink); width: 100%;
  }

  .rt-timer { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .rt-timer .num {
    font-family: var(--mono); font-size: 26px; font-weight: 600;
    letter-spacing: -.02em; min-width: 66px;
  }
  .rt-timer.hot .num { color: var(--alert); }
  .rt-bar { flex: 1; height: 5px; background: var(--rule-soft); overflow: hidden; }
  .rt-bar i { display: block; height: 100%; background: var(--ink); width: 100%; }
  .rt-timer.hot .rt-bar i { background: var(--alert); }

  .rt-count {
    font-family: var(--mono); font-size: 10.5px; color: var(--muted);
    display: flex; justify-content: space-between; margin-top: 6px;
  }
  .rt-count .over { color: var(--alert); }

  .rt-chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 14px; }
  .rt-chip {
    font-family: var(--mono); font-size: 11px; padding: 5px 10px;
    border: 1px solid var(--rule); background: #fff; cursor: pointer; color: var(--ink);
  }
  .rt-chip[aria-pressed=true] { background: var(--ink); color: #fff; border-color: var(--ink); }

  .rt-actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  .rt-btn.solid { background: var(--ink); color: #fff; border-color: var(--ink); }
  .rt-btn.solid:hover { background: var(--console-2); }
  .rt-note { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }

  .rt-saved { color: var(--good); font-family: var(--mono); font-size: 10.5px; }

  .rt-foot {
    display: flex; justify-content: space-between; gap: 12px;
    margin-top: 40px; padding-top: 18px; border-top: 2px solid var(--ink);
  }

  .rt-score {
    font-family: var(--mono); font-size: 12px; background: var(--console);
    color: #E3E9E7; padding: 10px 14px; margin: 18px 0;
  }
  .rt-score b { color: var(--sig); }

  .rt-out {
    font-family: var(--mono); font-size: 11.5px; white-space: pre-wrap;
    background: var(--ink); color: #C9D4D0; padding: 16px; max-height: 340px;
    overflow: auto; border: 1px solid var(--console-2);
  }

  @media (max-width: 760px) {
    .rt { grid-template-columns: 1fr; }
    .rt-rail { display: none; }
    .rt-logo-sm { display: block; }
    .rt-pane { padding: 22px 18px 60px; }
    .rt-h1 { font-size: 26px; }
    .rt-layer { grid-template-columns: 20px 1fr; }
    .rt-layer .tools { grid-column: 2; }
    .rt-do { box-shadow: 3px 3px 0 var(--console); }
  }
  @media (prefers-reduced-motion: reduce) { .rt * { transition: none !important; animation: none !important; } }
</style>

    <div class="rt-eyebrow">Module 02 · Layer 01, Record</div>
    <h1 class="rt-h1">ATS and CRM: the difference, and why it matters</h1>
    <p class="rt-lede">You will be asked this more than any other question. Learn to explain it in one simple sentence — because one day a finance director will ask you why he is paying two bills instead of one.</p>

    <div class="rt-card">
      <h4>The one-breath version</h4>
      <p><strong>An ATS is organised around jobs.</strong> A role opens, candidates flow through stages, someone gets hired, the file closes. It answers: <em>where is this vacancy up to?</em></p>
      <p><strong>A CRM is organised around relationships.</strong> People and companies you might do business with in two years. Nothing closes. It answers: <em>who do we know, and when did we last talk to them?</em></p>
      <p style="margin-top:10px"><strong>The trap:</strong> an ATS forgets people the moment the job closes. That is fine for a corporate HR team hiring for itself. It is fatal for an agency, whose entire asset is a network of people they placed once and could place again.</p>
    </div>

    <h2 class="rt-h2">Why agency tools blur the line</h2>
    <p>Corporate recruiting buys an ATS (Workday, Greenhouse) and, if it's sophisticated, a separate talent CRM. <strong>Agencies cannot work that way</strong> — the candidate is the product and the client company is also a sales prospect. So the tools you will actually discuss — Bullhorn, Crelate, PCRecruiter, Big Biller, Loxo — are all ATS <em>and</em> CRM in one box, with a sales pipeline bolted on.</p>
    <p>When a client asks "is this an ATS or a CRM?", the honest answer is usually: <em>"For an agency, it has to be both, and the real question is which half the vendor built first."</em> That sentence alone will mark you out as someone worth listening to.</p>

    <h2 class="rt-h2">The five platforms, told honestly</h2>
    <table class="rt-table">
      <tr><th>Platform</th><th>Built for</th><th>Real strength</th><th>Real weakness</th></tr>
      <tr><td>Bullhorn</td><td>Mid to large agencies with an ops person</td><td>Depth, and an enormous partner marketplace — almost everything integrates with it</td><td>Expensive, heavy, needs configuration and someone who owns it. Small firms drown.</td></tr>
      <tr><td>Crelate</td><td>Boutique and mid agencies</td><td>Modern interface, so recruiters actually use it. Adoption is its quiet superpower.</td><td>Less depth and fewer integrations at the enterprise end.</td></tr>

      <tr><td>Loxo</td><td>Firms who want one vendor, one bill</td><td>Bundles record + sourcing + outreach. Fewer tools to buy and train on.</td><td>Breadth over depth in places, and total dependence on one vendor's roadmap.</td></tr>

    <div class="rt-eyebrow">Module 03 · Layer 02, Find</div>
    <h1 class="rt-h1">Sourcing and AI: what it really does, and what it cannot do</h1>
    <p class="rt-lede">Almost every client will ask you about AI. Most of them are asking because they are worried their competitors are ahead, not because they want the technical details. If you understand how it works, you can calm them down.</p>

    <h2 class="rt-h2">Three generations of search, in plain terms</h2>
    <div class="rt-card">
      <h4>1. Boolean — you describe the words</h4>
      <p><code>("financial analyst" OR "FP&amp;A") AND CPA NOT recruiter</code>. Precise, and completely literal. It finds the words you typed. If a brilliant candidate wrote "management accountant" instead, she is invisible to you. <strong>The tool's weakness is your vocabulary.</strong></p>
    </div>
    <div class="rt-card">
      <h4>2. Semantic — the machine knows the words are related</h4>
      <p>The system has learned that "FP&amp;A", "financial planning", and "budget forecasting" live near each other in meaning. You search for one, it surfaces all three. This is what HireEZ-class tools mean by AI search: <strong>better recall, not judgement.</strong></p>
    </div>
    <div class="rt-card">
      <h4>3. Natural language — you describe the human</h4>
      <p>Juicebox and its PeopleGPT-style interface: <em>"nurse practitioners in Ohio who've worked in both hospital and clinic settings and moved jobs in the last two years."</em> The model translates intent into a query. Fast, and genuinely lowers the skill floor — a junior recruiter gets a decent list on day one.</p>
    </div>

    <div class="rt-pull rt-warn"><span class="lbl">Say this out loud once so it sticks</span>
      AI sourcing does <strong>retrieval and ranking</strong>. It does not do <strong>judgement</strong>. It cannot tell you whether she will take the job, whether she'll survive that hiring manager, or whether she's about to be promoted. It narrows the pile. A human still works the pile. Any vendor implying otherwise is selling; any client believing it will be disappointed and blame you.
    </div>

    <h2 class="rt-h2">The four honest limitations</h2>
    <ul>
      <li><strong>Data staleness.</strong> Aggregated profiles are scraped from public sources at some point in the past. Titles rot. A "current" profile may be two years old.</li>

      <li><strong>Bias.</strong> Models learn from historical hiring patterns, and historical hiring patterns contain every prejudice the industry has ever had. Screening tools inherit this. Sourcing tools are lower-risk than screening tools, and this distinction matters legally in the US.</li>

    <div class="rt-eyebrow">Module 04 · Layer 03, Reach</div>
    <h1 class="rt-h1">Why candidates stopped replying — and why a tool will not fix it</h1>
    <p class="rt-lede">Every agency reports the same thing: about 20% of candidates used to reply, now fewer than 10% do. Clients think they need better software. Usually they need fewer, better messages.</p>

    <h2 class="rt-h2">What SourceWhale-class tools actually do</h2>
    <ul>
      <li><strong>Sequences.</strong> A pre-built series — email day 1, LinkedIn day 3, call day 5, email day 8 — that fires automatically until someone replies. The follow-up is where placements come from, and the follow-up is what humans forget.</li>
      <li><strong>Multi-channel.</strong> Email plus LinkedIn plus call tasks, in one flow, tracked in one place.</li>
      <li><strong>Personalisation at volume.</strong> Merge fields, snippet libraries, increasingly AI-drafted openers.</li>
      <li><strong>Measurement.</strong> Reply rate per sequence, per recruiter, per step. This is often the first time an owner discovers <em>which</em> of his recruiters actually follows up.</li>
    </ul>

    <div class="rt-pull"><span class="lbl">The honest mechanic</span>
      Sequencing tools reliably increase <strong>replies</strong>, because most recruiters give up after one attempt and the tool doesn't. They do <strong>not</strong> increase reply <em>rate</em> — that's a function of your message and your reputation. A tool that sends bad copy just sends bad copy faster, to more people, and burns the list. Say this to a client and watch their face change.
    </div>

    <h2 class="rt-h2">Why the rate really fell</h2>
    <p>Two reasons, neither technological. First, volume: automation made outreach cheap, so every candidate now gets fifteen messages a week instead of two. Second, sameness: everyone automated using the same templates and the same AI drafting, so every message reads identically. The scarce thing is now <strong>evidence that a human read the profile.</strong></p>
    <p>Which produces an uncomfortable and very useful conclusion for you to carry into client calls: <em>the correct answer to falling response rates is often "send fewer, better messages" — which is a process recommendation that costs the client nothing and earns you the right to sell them something later.</em></p>

    <h2 class="rt-h2">Deliverability, briefly, because it will bite someone</h2>
    <p>Blast enough mail from a domain and providers start filing you as spam — including the client's normal business email. Volume-based outreach carries a real risk to the client's domain reputation. Knowing that this risk exists, and raising it before the vendor does, is a trust move.</p>

    <div class="rt-eyebrow">Module 05 · Layers 04 &amp; 05</div>
    <h1 class="rt-h1">Recording interviews, and working with other agencies</h1>

    <h2 class="rt-h2">Metaview and the recording layer</h2>
    <p>The pitch is simple: it joins the interview, transcribes it, and produces structured notes and a summary. The recruiter stops typing and starts listening. Four real benefits, in the order a client cares about them:</p>
    <ul>
      <li><strong>Speed to submittal.</strong> Notes are written by the time the call ends. On a busy desk that's an hour a day back.</li>
      <li><strong>Consistency.</strong> Every candidate gets asked comparable things, which makes comparison honest and makes your submittals look professional.</li>
      <li><strong>Coaching.</strong> A manager can hear how a junior actually conducts a call. This is the benefit owners buy and never mention in the demo.</li>
      <li><strong>Institutional memory.</strong> The recruiter leaves; the record of why the candidate was rejected doesn't.</li>
    </ul>

    <div class="rt-pull rt-warn"><span class="lbl">Raise this before the client does</span>
      <strong>Recording law.</strong> Several US states require all-party consent. Recording a candidate in California without consent is not a policy preference, it is a legal exposure. Also: recorded interviews are personal data with retention obligations under GDPR and US state privacy laws. Bring this up unprompted in the first conversation. It costs you nothing, it is genuinely useful, and it is the fastest credibility purchase available to a 24-year-old talking to a 58-year-old.
    </div>

    <h2 class="rt-h2">Co-Recruit and the split-desk layer</h2>
    <p>Splits are when one firm holds the job and another holds the candidate, and they share the fee. Collaboration tooling exists to make that trustworthy at a distance: who introduced whom, when, and who gets paid. The underlying business truth is that <strong>splits monetise the roles you cannot fill yourself</strong> — which is exactly the conversation to have with an agency whose recruiters are drowning.</p>

    <p>The best tool nobody logs into is worth less than the mediocre tool everyone uses. When a client says <em>"we bought an ATS and nobody used it,"</em> the software was almost never the cause. The causes are: no one owned it, nothing was mandatory, the old way still worked, and the top biller was allowed to opt out — at which point everyone learned it was optional.</p>

    <p><strong>Parsing</strong> reads a CV and drops it into fields. It is imperfect and always has been. <strong>Duplicates</strong> accumulate until one candidate exists four times and nobody knows which record is real. <strong>Free-text fields</strong> feel flexible and destroy reporting — you cannot count a field where five people typed the same status five ways. An owner who says <em>"I'm not sure the data is real"</em> is telling you his reporting layer is decorative.</p>

    <h2 class="rt-h2">3. Integrations — where the delays come from</h2>
    <p>Native integration means the vendor built and maintains it; it works. Middleware means a third party holds it together. API means someone is writing code, and "we have an API" is what a vendor says when the integration does not exist. <strong>The question to ask in every demo:</strong> "Is that native, or does someone have to build it — and who fixes it when it breaks at 2am?"</p>

    <h2 class="rt-h2">4. Pricing — read the shape, not the number</h2>

      <tr><th>Model</th><th>Watch for</th></tr>

      <tr><td>Implementation fee</td><td>One-off, often negotiable, frequently underestimated by a factor of two.</td></tr>
      <tr><td>Annual commitment</td><td>The lock-in. Always ask what's left on the current one before you recommend anything.</td></tr>

        <li>"Walk me through what happens from the moment a job comes in — click by click."</li>

  function timedItem(host, cfg) {
    // cfg: {key, seconds, promptHTML, placeholder, onDone}
    const el = document.createElement('div');
    el.className = 'rt-do';
    el.innerHTML = `
      <div class="rt-do-head"><span class="tag">${esc(cfg.tag || 'Live')}</span><span class="ttl">${esc(cfg.title)}</span></div>
      <div class="rt-do-body">
        <div class="rt-timer"><span class="num">--:--</span><span class="rt-bar"><i></i></span></div>
        ${cfg.promptHTML}
        <textarea rows="${cfg.rows || 4}" placeholder="${esc(cfg.placeholder || 'Type your answer here. The clock is running.')}" disabled></textarea>
        <div class="rt-count"><span class="w">0 words</span><span class="st">Not started</span></div>
        <div class="rt-actions">
          <button class="rt-btn solid go">Start clock</button>
          <button class="rt-btn ghost lock" style="border-color:var(--rule);color:var(--ink)" disabled>I'm done — submit</button>
        </div>
      </div>`;
    host.appendChild(el);

    const t = el.querySelector('.rt-timer'), num = el.querySelector('.num'),
      bar = el.querySelector('.rt-bar i'), ta = el.querySelector('textarea'),
      wc = el.querySelector('.w'), st = el.querySelector('.st'),
      go = el.querySelector('.go'), lock = el.querySelector('.lock');

    let left = cfg.seconds, timer = null, running = false;
    const paint = () => {
      num.textContent = String(Math.floor(left / 60)).padStart(2, '0') + ':' + String(left % 60).padStart(2, '0');
      bar.style.width = (left / cfg.seconds * 100) + '%';
      t.classList.toggle('hot', left <= Math.max(10, cfg.seconds * 0.2));
    };
    paint();

    const stop = (why) => {
      clearInterval(timer); running = false;
      ta.disabled = true; go.disabled = true; lock.disabled = true;
      st.textContent = why; st.className = 'st over';
      LOG.answers[cfg.key] = ta.value;
      if (cfg.onDone) cfg.onDone();
    };

    go.onclick = () => {
      if (running) return;
      running = true; ta.disabled = false; ta.focus(); go.disabled = true; lock.disabled = false;
      st.textContent = 'Running'; st.className = 'st';
      timer = setInterval(() => { left--; paint(); if (left <= 0) stop('Time is up. Your answer is saved.'); }, 1000);
    };
    lock.onclick = () => stop('Submitted with ' + num.textContent + ' still on the clock.');
    ta.addEventListener('input', () => {
      LOG.answers[cfg.key] = ta.value;
      const n = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
      wc.textContent = n + (n === 1 ? ' word' : ' words');
    });
    if (LOG.answers[cfg.key]) { ta.value = LOG.answers[cfg.key]; stop('Already answered'); }
    return el;
  }

  /* ---- drill builders ---- */
  function buildA(host) {
    DRILL_A.forEach((d, i) => {
      timedItem(host, {
        key: 'A' + (i + 1), seconds: 90, tag: 'Item ' + (i + 1) + '/5',
        title: 'Explain this to: ' + d.p,
        promptHTML: `<div class="rt-pull"><span class="lbl">The difficult sentence</span>${esc(d.s)}</div>`,
        placeholder: 'Write it the way you would say it out loud to this person. Simple words. Start with what it means for them.',
        rows: 3
      });
    });
  }

  function buildB(host) {
    const el = document.createElement('div');
    el.className = 'rt-do';
    el.innerHTML = `
      <div class="rt-do-head"><span class="tag">Build</span><span class="ttl">Your call plan</span></div>
      <div class="rt-do-body">
        <label class="fld">Choose the five questions you will ask. You only get 25 minutes with him, and he interrupts, so five is all you will really get. Click to select.</label>
        <div class="rt-chiprow" id="rt-bq"></div>
        <label class="fld" for="rt-b1">Write your opening. First 20 seconds, word for word.</label>
        <textarea id="rt-b1" rows="3" data-log="B_open" placeholder="Write the exact words you would say. He has never met you, and you joined the call three minutes late."></textarea>
        <label class="fld" for="rt-b2">Minute 3, he says: "Look, I don't have long. What do you recommend?" — you have named no product yet. Word for word.</label>
        <textarea id="rt-b2" rows="3" data-log="B_push" placeholder="Think before you answer. You still do not know what his problem is. This is the most important answer on this page."></textarea>
        <label class="fld" for="rt-b3">Minute 18: "You haven't recommended anything yet. Is this how all your calls go?"</label>
        <textarea id="rt-b3" rows="3" data-log="B_press" placeholder=""></textarea>
        <label class="fld" for="rt-b4">Minute 25: "So — what happens next?"</label>
        <textarea id="rt-b4" rows="2" data-log="B_close" placeholder="Say exactly what you will do, by which day, and what you need from him."></textarea>
      </div>`;
    host.appendChild(el);
    const Q = [
      "What ATS are you on?", "Walk me through what happens when a job comes in",
      "What's it costing you?", "Which recruiters don't log activity?",
      "What have you tried already?", "What's your budget?",
      "What's left on your contract?", "Who else needs to agree?",
      "If we fixed one thing, which?", "How do you know the data is right?",
      "What does your competitor do differently?", "Do you want AI?",
      "How many seats do you have?", "What happens when your best biller ignores the process?"
    ];
    const row = el.querySelector('#rt-bq');
    LOG.answers.B_questions = LOG.answers.B_questions || [];
    Q.forEach(q => {
      const c = document.createElement('button');
      c.className = 'rt-chip'; c.textContent = q;
      const on = LOG.answers.B_questions.includes(q);
      c.setAttribute('aria-pressed', on ? 'true' : 'false');
      c.onclick = () => {
        const arr = LOG.answers.B_questions;
        const i = arr.indexOf(q);
        if (i > -1) { arr.splice(i, 1); c.setAttribute('aria-pressed', 'false'); }
        else if (arr.length < 5) { arr.push(q); c.setAttribute('aria-pressed', 'true'); }
      };
      row.appendChild(c);
    });
    bindLogged(el);
  }

  function buildC(host) {
    let i = 0;
    const shell = document.createElement('div');
    host.appendChild(shell);
    const next = () => {
      if (i >= DRILL_C.length) {
        const d = document.createElement('div');
        d.className = 'rt-pull';
        d.innerHTML = '<span class="lbl">Finished</span>All ten done. Now go and tell Rubab which one was the hardest for you, and why. Being able to say that honestly matters as much as the ten answers you just wrote.';
        shell.appendChild(d);
        return;
      }
      const n = i + 1;
      timedItem(shell, {
        key: 'C' + n, seconds: 45, tag: n + '/10',
        title: 'Objection ' + n,
        promptHTML: `<div class="rt-pull rt-warn"><span class="lbl">The client says to you</span>“${esc(DRILL_C[i])}”</div>`,
        placeholder: 'Write what you would say out loud. Agree with the true part first.',
        rows: 3,
        onDone: () => { i++; setTimeout(next, 400); }
      }).scrollIntoView({ block: 'center', behavior: 'smooth' });
    };
    next();
  }

  function buildD(host) {
    const el = document.createElement('div');
    el.className = 'rt-do';
    el.innerHTML = `
      <div class="rt-do-head"><span class="tag">Teardown</span><span class="ttl">After your 20 minutes</span></div>
      <div class="rt-do-body">
        <label class="fld" for="rt-d0">Product assigned</label>
        <input type="text" id="rt-d0" data-log="D_product" placeholder="Rubab will tell you at 20:50">
        <label class="fld" for="rt-d1">In one sentence: what problem does it solve, and for whom?</label>
        <textarea id="rt-d1" rows="2" data-log="D_what"></textarea>
        <label class="fld" for="rt-d2">Three real reasons a client should NOT buy it</label>
        <textarea id="rt-d2" rows="5" data-log="D_against" placeholder="1.&#10;2.&#10;3.&#10;&#10;Do not copy the website. Think about price, difficulty, who has to maintain it, or what it cannot do."></textarea>
        <label class="fld" for="rt-d3">Who is it honestly wrong for? Describe the firm.</label>
        <textarea id="rt-d3" rows="2" data-log="D_nonfit"></textarea>
        <label class="fld" for="rt-d4">One question you would ask the company that makes it, before letting your client sign the contract</label>
        <textarea id="rt-d4" rows="2" data-log="D_vendorq"></textarea>
        <label class="fld" for="rt-d5">What did you NOT understand in the last 20 minutes?</label>
        <textarea id="rt-d5" rows="3" data-log="D_gaps" placeholder="Nobody understands everything in 20 minutes, and saying so does not lose you marks here. Name the part you skipped or could not follow."></textarea>
      </div>`;
    host.appendChild(el);
    bindLogged(el);
  }

  function buildE(host) {
    const el = document.createElement('div');
    el.className = 'rt-do';
    el.innerHTML = `
      <div class="rt-do-head"><span class="tag">Case</span><span class="ttl">Meridian — your working</span></div>
      <div class="rt-do-body">
        <label class="fld" for="rt-e1">Look at the five things he says are wrong. Which ones could software fix, and which ones are really about people or the way they work?</label>
        <textarea id="rt-e1" rows="5" data-log="E_sort"></textarea>
        <label class="fld" for="rt-e2">What are you assuming right now that could be wrong?</label>
        <textarea id="rt-e2" rows="3" data-log="E_assume" placeholder="An assumption is something you believe but have not checked. Write at least two, and say what you would ask him to check if you are right."></textarea>
        <label class="fld" for="rt-e3">If you could only fix ONE symptom, which — and why that one over the others?</label>
        <textarea id="rt-e3" rows="3" data-log="E_one"></textarea>
        <label class="fld" for="rt-e4">How would you spend the $40,000? Be specific.</label>
        <textarea id="rt-e4" rows="4" data-log="E_spend" placeholder="Remember the limits: 14 months left on his PCRecruiter contract, no IT staff, and an owner who does not trust new technology. You do not have to spend all of it."></textarea>
        <label class="fld" for="rt-e5">Is there something you could advise that earns BPO Wizard nothing, but is the right thing for this client?</label>
        <textarea id="rt-e5" rows="3" data-log="E_honest" placeholder="There is one. Keep thinking. Saying it out loud to a client is how you become someone they trust."></textarea>
        <label class="fld" for="rt-e6">Tomorrow you will present this. Slide 1 must say what you recommend, in one sentence, in 40 words or fewer. Write that sentence now.</label>
        <textarea id="rt-e6" rows="2" data-log="E_slide1"></textarea>
        <div class="rt-count"><span class="w2">0 / 40 words</span><span></span></div>
      </div>`;
    host.appendChild(el);
    bindLogged(el);
    const s1 = el.querySelector('#rt-e6'), w2 = el.querySelector('.w2');
    const cnt = () => {
      const n = s1.value.trim() ? s1.value.trim().split(/\s+/).length : 0;
      w2.textContent = n + ' / 40 words';
      w2.className = n > 40 ? 'w2 over' : 'w2';
    };
    s1.addEventListener('input', cnt); cnt();
  }

  function buildF(host) {
    timedItem(host, {
      key: 'F_open', seconds: 60, tag: 'Live',
      title: 'The first 60 seconds of your reply',
      promptHTML: `<div class="rt-pull rt-warn"><span class="lbl">He has just said</span>“I'll be honest with you, I think we made a mistake trusting you people.”</div>`,
      placeholder: 'Write the exact words you would say to him. He is angry and he has just insulted your company.', rows: 4
    });
    const el = document.createElement('div');
    el.className = 'rt-do';
    el.innerHTML = `
      <div class="rt-do-head"><span class="tag">Then</span><span class="ttl">The rest of the call</span></div>
      <div class="rt-do-body">
        <label class="fld" for="rt-f1">When do you tell him the two facts — at the start, later, or not at all? Explain your choice.</label>
        <textarea id="rt-f1" rows="3" data-log="F_facts"></textarea>
        <label class="fld" for="rt-f2">What part of this is genuinely your fault? Say it in the words you'd use to him.</label>
        <textarea id="rt-f2" rows="3" data-log="F_own" placeholder="You could argue none of this is your fault. That answer is correct, and it will lose you the client. Look again."></textarea>
        <label class="fld" for="rt-f3">Your plan to fix it. Say what you will do, by which date, and when you will call him back to check.</label>
        <textarea id="rt-f3" rows="4" data-log="F_plan"></textarea>
        <label class="fld" for="rt-f4">He asks for the implementation fee back. Answer him.</label>
        <textarea id="rt-f4" rows="3" data-log="F_fee"></textarea>
      </div>`;
    host.appendChild(el);
    bindLogged(el);
  }

  /* ---- export ---- */
  function tally() {
    const done = Object.keys(LOG.mcq).length, right = Object.values(LOG.mcq).filter(x => x.correct).length;
    const written = Object.keys(LOG.answers).filter(k => typeof LOG.answers[k] === 'string' && LOG.answers[k].trim()).length;
    const words = Object.values(LOG.answers).filter(v => typeof v === 'string').join(' ').trim().split(/\s+/).filter(Boolean).length;
    return { done, right, written, words };
  }

  function transcript() {
    const t = tally();
    const L = [];
    L.push('# RecTech Assessment — Day 1 Session Transcript');
    L.push('');
    L.push('**Operator:** ' + (LOG.operator || '(not set)'));
    L.push('**Started:** ' + LOG.started.toLocaleString());
    L.push('**Submitted:** ' + new Date().toLocaleString());
    L.push('**Knowledge checks:** ' + t.right + ' / ' + t.done + ' correct · **Written responses:** ' + t.written + ' · **Total words:** ' + t.words);
    L.push('');
    L.push('---');
    L.push('');
    L.push('## Self-assessment at start');
    L.push(LOG.answers.honest || '(blank)');
    L.push('');
    L.push('## Knowledge checks');
    Object.keys(LOG.mcq).forEach(k => L.push('- ' + k + ': option ' + 'ABCD'[LOG.mcq[k].picked] + ' — ' + (LOG.mcq[k].correct ? 'correct' : 'incorrect')));
    L.push('');
    const sect = (title, keys) => {
      L.push('## ' + title);
      keys.forEach(([k, label]) => {
        const v = LOG.answers[k];
        L.push('**' + label + '**');
        L.push('');
        L.push(Array.isArray(v) ? (v.length ? v.map(x => '- ' + x).join('\n') : '(none selected)') : (v && v.trim() ? v : '(blank)'));
        L.push('');
      });
    };
    sect('Drill A — Translate it', DRILL_A.map((d, i) => ['A' + (i + 1), 'Item ' + (i + 1) + ' → ' + d.p]));
    sect('Drill B — Discovery call', [['B_questions', 'Questions selected'], ['B_open', 'Opening'], ['B_push', 'Minute 3 push'], ['B_press', 'Minute 18 pressure'], ['B_close', 'Close']]);
    sect('Drill C — Objection rapid fire', DRILL_C.map((o, i) => ['C' + (i + 1), 'Obj ' + (i + 1) + ': ' + o]));
    sect('Drill D — Teardown', [['D_product', 'Product'], ['D_what', 'What it solves'], ['D_against', 'Three reasons not to buy'], ['D_nonfit', 'Wrong for'], ['D_vendorq', 'Question for vendor'], ['D_gaps', 'What I did not understand']]);
    sect('Drill E — Meridian case', [['E_sort', 'Symptom sort'], ['E_assume', 'Assumptions'], ['E_one', 'The one fix'], ['E_spend', 'The $40K'], ['E_honest', 'The unprofitable right answer'], ['E_slide1', 'Slide 1']]);
    sect('Drill F — Angry client', [['F_open', 'First 60 seconds'], ['F_facts', 'Use of the two facts'], ['F_own', 'Ownership'], ['F_plan', 'Recovery plan'], ['F_fee', 'The refund question']]);
    sect('Reflection', [['reflect_worst', 'Worst drill'], ['reflect_weak', 'Would be bad at'], ['reflect_unknown', 'When I do not know'], ['reflect_want', 'Do I want this']]);
    return L.join('\n');
  }

  /* ---- per-page wiring ---- */
  function wire() {
    bindMCQ(pane);
    bindLogged(pane);

    const op = pane.querySelector('#rt-op');
    if (op) {
      op.value = LOG.operator || '';
      const hon = pane.querySelector('#rt-hon');
      hon.value = LOG.answers.honest || '';
      hon.addEventListener('input', () => LOG.answers.honest = hon.value);
      pane.querySelector('#rt-begin').onclick = () => {
        if (!op.value) { pane.querySelector('#rt-begin-note').textContent = 'Pick a name first.'; return; }
        LOG.operator = op.value;
        LOG.started = new Date();
        document.getElementById('rt-who').textContent = 'Operator: ' + op.value.split(' ')[0];
        go(idx + 1);
      };
    }

    const a = pane.querySelector('#rt-drillA'); if (a) buildA(a);
    const b = pane.querySelector('#rt-drillB'); if (b) buildB(b);
    const c = pane.querySelector('#rt-drillC'); if (c) buildC(c);
    const d = pane.querySelector('#rt-drillD'); if (d) buildD(d);
    const e = pane.querySelector('#rt-drillE'); if (e) buildE(e);
    const f = pane.querySelector('#rt-drillF'); if (f) buildF(f);

    const tl = pane.querySelector('#rt-tally');
    if (tl) {
      const t = tally();
      tl.innerHTML = `OPERATOR <b>${esc(LOG.operator || 'not set')}</b> &nbsp;·&nbsp; KNOWLEDGE CHECKS <b>${t.right}/${t.done}</b> &nbsp;·&nbsp; WRITTEN RESPONSES <b>${t.written}</b> &nbsp;·&nbsp; WORDS <b>${t.words}</b>`;
      let text = '';
      const out = pane.querySelector('#rt-out');
      pane.querySelector('#rt-build').onclick = () => {
        text = transcript();
        out.style.display = 'block'; out.textContent = text;
        pane.querySelector('#rt-copy').disabled = false;
        pane.querySelector('#rt-dl').disabled = false;
        pane.querySelector('#rt-exp-note').textContent = 'Built. Copy it or download it.';
      };
      pane.querySelector('#rt-copy').onclick = async () => {
        try { await navigator.clipboard.writeText(text); pane.querySelector('#rt-exp-note').textContent = 'Copied to clipboard.'; }
        catch { out.focus(); pane.querySelector('#rt-exp-note').textContent = 'Clipboard blocked — select the text below and copy manually.'; }
      };
      pane.querySelector('#rt-dl').onclick = () => {
        const blob = new Blob([text], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a2 = document.createElement('a');
        a2.href = url;
        a2.download = 'RecTech_Day1_' + (LOG.operator || 'candidate').replace(/\s+/g, '_') + '.doc';
        a2.click(); URL.revokeObjectURL(url);
        pane.querySelector('#rt-exp-note').textContent = 'Downloaded.';
      };
    }
  }

  go(0);
})();
</script>
